# /etc/postgresql/16/main/conf.d/zz-cafe.conf
# Conservative tuning for a co-located Postgres on a 1 GB box. Restart PG after
# changing. Bump shared_buffers/effective_cache_size proportionally if you resize.
shared_buffers = 128MB
effective_cache_size = 384MB
maintenance_work_mem = 64MB
work_mem = 4MB
max_connections = 25            # API uses DB_MAX_CONNS=10; leave room for migrate/psql/backup
wal_compression = on
# loopback only — the API and migrate connect over 127.0.0.1; do not expose publicly.
listen_addresses = 'localhost'
