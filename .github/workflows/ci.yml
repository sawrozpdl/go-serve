name: ci

on:
  push:
    # `prod` is the Coolify deploy branch — run the same gate there so
    # deploy-coolify.yml (workflow_run on ci success) only fires on green.
    branches: [main, prod]
  pull_request:

jobs:
  api:
    name: api (go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: apps/api/go.sum
      - name: vet
        run: cd apps/api && go vet ./...
      - name: build
        run: cd apps/api && go build ./...
      - name: test
        run: cd apps/api && go test ./... -race -count=1

  web:
    name: web (node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm typecheck
      - run: pnpm --filter @cafe-mgmt/web build
      - run: pnpm test
