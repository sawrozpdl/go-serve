root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server ./cmd/server"
  entrypoint = ["./tmp/server"]
  include_ext = ["go", "tpl", "tmpl", "html", "sql"]
  exclude_dir = ["tmp", "bin", "test", "migrations", "vendor"]
  include_dir = ["cmd", "internal"]
  exclude_regex = ["_test\\.go"]
  delay = 500
  stop_on_error = true
  send_interrupt = true
  kill_delay = "2s"
  log = "build-errors.log"

[log]
  time = false
  main_only = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
