<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background tile: dark, slightly rounded — matches the app shell. -->
  <rect width="32" height="32" rx="6" fill="#141416"/>

  <!-- Steam wisps -->
  <g fill="none" stroke="#d69e2e" stroke-width="1.6" stroke-linecap="round">
    <path d="M11 8 C 12 6, 10 5, 11 3"/>
    <path d="M16 8 C 17 6, 15 5, 16 3"/>
    <path d="M21 8 C 22 6, 20 5, 21 3"/>
  </g>

  <!-- Saucer shadow -->
  <ellipse cx="16" cy="27" rx="10" ry="1.4" fill="#d69e2e" opacity="0.25"/>

  <!-- Cup body -->
  <path d="M6 12 H24 C24 21 21 26 15 26 C9 26 6 21 6 12 Z" fill="#d69e2e"/>

  <!-- Handle -->
  <path d="M24 14 C 29 14, 29 21, 24 21" fill="none" stroke="#d69e2e" stroke-width="2" stroke-linecap="round"/>

  <!-- Coffee surface -->
  <ellipse cx="15" cy="13" rx="8" ry="1.2" fill="#2a1d0a"/>
</svg>
